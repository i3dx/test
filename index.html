<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PONG NEO - 火龙觉醒版</title>
    <style>
        :root {
            --neon-blue: #0ff;
            --neon-pink: #f66;
            --neon-green: #0f8;
            --neon-fire: #ff6600;
            --bg-dark: #0a0a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: radial-gradient(circle at center, #1a0a2e 0%, #0a0a1a 100%);
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 98vw;
            max-width: 832px;
            text-align: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 200;
            letter-spacing: 12px;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .top-ui {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            padding: 0 20px;
        }

        .score-board {
            font-size: clamp(1.5rem, 6vw, 3rem);
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 12px;
        }

        #playerScore {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        #computerScore {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .special-gauge {
            padding: 4px 12px;
            font-size: 0.8rem;
            color: var(--neon-fire);
            border: 1px solid var(--neon-fire);
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.3);
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 1;
            overflow: hidden;
            border: 3px solid #333;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 255, 255, 0.15);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            background: #000;
        }

        .ui-overlay {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        .difficulty-group {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            color: #aaa;
            letter-spacing: 1px;
            cursor: pointer;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            color: #fff;
            background: #333;
            border-color: #666;
        }

        .btn.active {
            font-weight: bold;
            color: #000;
            background: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .main-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 5px;
        }

        .start-btn {
            min-width: 120px;
            font-weight: bold;
            color: #000;
            background: var(--neon-green);
            border: none;
        }

        .stop-btn {
            color: var(--neon-pink);
            background: transparent;
            border: 1px solid var(--neon-pink);
        }

        .start-btn:hover {
            box-shadow: 0 0 25px var(--neon-green);
            transform: scale(1.05);
        }

        .hint-container {
            margin-top: 8px;
        }

        .controls-hint {
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #0cf;
            opacity: 0.6;
        }

        .special-hint {
            margin-top: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--neon-fire);
            text-shadow: 0 0 5px rgba(255, 102, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>NEO PONG • 觉醒</h1>

        <div class="top-ui">
            <div class="special-gauge">火龙招式: <span id="specialCount">30</span> / 30</div>
            <div class="score-board">
                <span id="playerScore">00</span><span style="opacity: 0.3;">:</span><span id="computerScore">00</span>
            </div>
            <div style="width: 100px; text-align: right; font-size: 0.8rem; opacity: 0.5;">[ P1 ]</div>
        </div>

        <div class="canvas-wrapper" id="shakeWrapper">
            <canvas id="gameCanvas" width="832" height="416"></canvas>
        </div>

        <div class="ui-overlay">
            <div class="difficulty-group">
                <button class="btn" id="easy" onclick="game.setDiff('easy')">休闲</button>
                <button class="btn active" id="medium" onclick="game.setDiff('medium')">标准</button>
                <button class="btn" id="hard" onclick="game.setDiff('hard')">大师</button>
            </div>
            <div class="main-actions">
                <button class="btn start-btn" id="startBtn" onclick="game.start()">开始比赛</button>
                <button class="btn stop-btn" onclick="game.resetMatch()">重置局分</button>
            </div>
            <div class="hint-container">
                <p class="controls-hint">W/S 或 ↑/↓ 控制移动 | 鼠标移动控制 | 触摸滑动</p>
                <p class="special-hint">【 空格键 】释放：火龙高速球 (每局30次)</p>
            </div>
        </div>
    </div>

    <script>
        class PongGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d', { alpha: false });
                this.shakeWrapper = document.getElementById('shakeWrapper');
                this.specialCountEl = document.getElementById('specialCount');
                this.playerScoreEl = document.getElementById('playerScore');
                this.computerScoreEl = document.getElementById('computerScore');
                this.startBtn = document.getElementById('startBtn');
                this.difficultyButtons = document.querySelectorAll('.difficulty-group .btn');

                this.width = 832;
                this.height = 416;
                this.maxParticles = 300;
                this.normalTrailLength = 12;
                this.fireTrailLength = 20;

                this.diffs = {
                    easy: { aiSpeed: 220, error: 120, ballSpeed: 380 },
                    medium: { aiSpeed: 320, error: 70, ballSpeed: 480 },
                    hard: { aiSpeed: 480, error: 25, ballSpeed: 620 }
                };
                this.curDiff = 'medium';

                this.running = false;
                this.lastTime = 0;
                this.shakeTime = 0;
                this.shakeIntensity = 0;
                this.particles = [];
                this.specialCharges = 30;
                this.isFireMode = false;
                this.server = 2;

                this.ball = { x: 416, y: 208, r: 6, sx: 0, sy: 0, trail: [] };
                this.p1 = { x: 20, y: 168, w: 10, h: 80, s: 0, color: '#0f8' };
                this.p2 = { x: 802, y: 168, w: 10, h: 80, s: 0, color: '#f66' };

                this.keys = {};
                this.touchY = null;

                this.bgCanvas = document.createElement('canvas');
                this.bgCanvas.width = this.width;
                this.bgCanvas.height = this.height;
                this.renderBgCache();

                this.initAudio();
                this.initEvents();
                this.draw();
            }

            initAudio() {
                this.audioCtx = null;
                const resumeAudio = () => {
                    if (!this.audioCtx) {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (this.audioCtx.state === 'suspended') {
                        this.audioCtx.resume();
                    }
                };

                window.addEventListener('click', resumeAudio, { once: true });
                window.addEventListener('touchstart', resumeAudio, { once: true });
            }

            beep(frequency, duration, volume = 0.1) {
                if (!this.audioCtx) {
                    return;
                }

                const oscillator = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();

                oscillator.type = this.isFireMode ? 'sawtooth' : 'sine';
                oscillator.frequency.setValueAtTime(frequency, this.audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);

                oscillator.connect(gain);
                gain.connect(this.audioCtx.destination);
                oscillator.start();
                oscillator.stop(this.audioCtx.currentTime + duration);
            }

            initEvents() {
                this.canvas.addEventListener('mouseenter', () => {
                    if (this.running) {
                        this.canvas.style.cursor = 'none';
                    }
                });

                this.canvas.addEventListener('mouseleave', () => {
                    this.canvas.style.cursor = 'default';
                });

                window.addEventListener('keydown', event => {
                    const key = event.key.toLowerCase();
                    this.keys[key] = true;

                    if ((key === ' ' || key === 'spacebar') && this.running) {
                        this.triggerSpecial();
                        event.preventDefault();
                    }
                });

                window.addEventListener('keyup', event => {
                    this.keys[event.key.toLowerCase()] = false;
                });

                this.canvas.addEventListener('touchstart', event => {
                    this.touchY = event.touches[0].clientY;
                    event.preventDefault();
                }, { passive: false });

                this.canvas.addEventListener('touchmove', event => {
                    if (this.touchY !== null) {
                        const delta = event.touches[0].clientY - this.touchY;
                        this.p1.y = this.clamp(this.p1.y + delta, 0, this.height - this.p1.h);
                        this.touchY = event.touches[0].clientY;
                    }
                    event.preventDefault();
                }, { passive: false });

                this.canvas.addEventListener('touchend', () => {
                    this.touchY = null;
                });

                this.canvas.addEventListener('mousemove', event => {
                    if (!this.running) {
                        return;
                    }

                    const rect = this.canvas.getBoundingClientRect();
                    const scaleY = this.height / rect.height;
                    const mouseY = (event.clientY - rect.top) * scaleY;
                    this.p1.y = this.clamp(mouseY - this.p1.h / 2, 0, this.height - this.p1.h);
                });

                this.canvas.addEventListener('mousedown', event => {
                    if (this.running && event.button === 0) {
                        this.triggerSpecial();
                    }
                });
            }

            clamp(value, min, max) {
                return Math.max(min, Math.min(max, value));
            }

            triggerSpecial() {
                if (this.specialCharges <= 0 || this.isFireMode) {
                    return;
                }

                this.isFireMode = true;
                this.specialCharges--;
                this.specialCountEl.innerText = this.specialCharges;

                if (this.ball.sx < 0) {
                    this.ball.sx = -this.ball.sx * 3;
                } else {
                    this.ball.sx = Math.abs(this.ball.sx) * 3;
                }

                this.shake(0.5, 12);
                this.beep(800, 0.4, 0.2);
                this.spawnParticles(this.ball.x, this.ball.y, '#ff6600', 30);
            }

            setDiff(diff) {
                if (this.running && this.p1.s + this.p2.s > 0) {
                    return;
                }

                this.curDiff = diff;
                this.difficultyButtons.forEach(button => {
                    button.classList.toggle('active', button.id === diff);
                });
            }

            renderBgCache() {
                const bctx = this.bgCanvas.getContext('2d');
                bctx.fillStyle = '#000';
                bctx.fillRect(0, 0, this.width, this.height);
                bctx.strokeStyle = '#222';
                bctx.lineWidth = 2;
                bctx.setLineDash([15, 15]);
                bctx.beginPath();
                bctx.moveTo(this.width / 2, 0);
                bctx.lineTo(this.width / 2, this.height);
                bctx.stroke();

                bctx.strokeStyle = '#1a1a1a';
                bctx.setLineDash([]);
                bctx.lineWidth = 1;
                bctx.strokeRect(5, 5, this.width - 10, this.height - 10);
            }

            spawnParticles(x, y, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x,
                        y,
                        color,
                        vx: (Math.random() - 0.5) * 15,
                        vy: (Math.random() - 0.5) * 15,
                        life: 1,
                        size: Math.random() * 3 + 1
                    });
                }

                if (this.particles.length > this.maxParticles) {
                    this.particles.splice(0, this.particles.length - this.maxParticles);
                }
            }

            shake(duration = 0.2, intensity = 5) {
                this.shakeTime = duration;
                this.shakeIntensity = intensity;
            }

            pushTrailPoint() {
                const limit = this.isFireMode ? this.fireTrailLength : this.normalTrailLength;
                this.ball.trail.push({ x: this.ball.x, y: this.ball.y, fire: this.isFireMode });
                if (this.ball.trail.length > limit) {
                    this.ball.trail.splice(0, this.ball.trail.length - limit);
                }
            }

            updateParticles(dt) {
                let writeIndex = 0;

                for (let readIndex = 0; readIndex < this.particles.length; readIndex++) {
                    const particle = this.particles[readIndex];
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.life -= dt * 1.5;

                    if (particle.life > 0) {
                        this.particles[writeIndex] = particle;
                        writeIndex++;
                    }
                }

                this.particles.length = writeIndex;
            }

            resetBall() {
                const diff = this.diffs[this.curDiff];

                if (this.server === 1) {
                    this.ball.x = this.p1.x + this.p1.w + this.ball.r + 10;
                    this.ball.y = this.p1.y + this.p1.h / 2;
                } else {
                    this.ball.x = this.p2.x - this.ball.r - 10;
                    this.ball.y = this.p2.y + this.p2.h / 2;
                }

                this.ball.sx = (this.server === 1 ? 1 : -1) * diff.ballSpeed;
                this.ball.sy = (Math.random() * 2 - 1) * diff.ballSpeed * 0.5;
                this.ball.trail = [];
                this.isFireMode = false;
            }

            update(dt) {
                if (this.shakeTime > 0) {
                    this.shakeTime -= dt;
                    const offset = this.shakeIntensity || 5;
                    this.shakeWrapper.style.transform = `translate(${(Math.random() - 0.5) * offset}px, ${(Math.random() - 0.5) * offset}px)`;
                } else {
                    this.shakeWrapper.style.transform = '';
                }

                this.updateParticles(dt);

                const playerSpeed = 600;
                if (this.keys.w || this.keys.arrowup) {
                    this.p1.y -= playerSpeed * dt;
                }
                if (this.keys.s || this.keys.arrowdown) {
                    this.p1.y += playerSpeed * dt;
                }
                this.p1.y = this.clamp(this.p1.y, 0, this.height - this.p1.h);

                const diff = this.diffs[this.curDiff];
                let targetY = this.height / 2 - this.p2.h / 2;
                if (this.ball.sx > 0) {
                    const predictionError = Math.sin(Date.now() / 400) * diff.error;
                    targetY = this.ball.y - this.p2.h / 2 + predictionError;
                }

                const distance = targetY - this.p2.y;
                this.p2.y += distance * (diff.aiSpeed / 100) * dt * 10;
                this.p2.y = this.clamp(this.p2.y, 0, this.height - this.p2.h);

                this.ball.x += this.ball.sx * dt;
                this.ball.y += this.ball.sy * dt;
                this.pushTrailPoint();

                if (this.isFireMode && Math.random() > 0.5) {
                    this.spawnParticles(this.ball.x, this.ball.y, '#ffaa00', 1);
                }

                if (this.ball.y < this.ball.r || this.ball.y > this.height - this.ball.r) {
                    this.ball.sy *= -1;
                    this.ball.y = this.ball.y < this.ball.r ? this.ball.r : this.height - this.ball.r;
                    this.beep(this.isFireMode ? 400 : 200, 0.05);
                    if (this.isFireMode) {
                        this.shake(0.1, 3);
                    }
                }

                const paddle = this.ball.sx < 0 ? this.p1 : this.p2;
                if (
                    this.ball.x + this.ball.r > paddle.x &&
                    this.ball.x - this.ball.r < paddle.x + paddle.w &&
                    this.ball.y + this.ball.r > paddle.y &&
                    this.ball.y - this.ball.r < paddle.y + paddle.h
                ) {
                    const hitNormal = (this.ball.y - (paddle.y + paddle.h / 2)) / (paddle.h / 2);

                    if (this.isFireMode && paddle === this.p2) {
                        this.isFireMode = false;
                        this.ball.sx = -Math.abs(this.ball.sx) / 2.5;
                    } else {
                        this.ball.sx = (this.ball.sx < 0 ? 1 : -1) * Math.min(Math.abs(this.ball.sx) * 1.02, 900);
                    }

                    this.ball.sy = 700 * hitNormal;
                    this.ball.x = this.ball.sx > 0 ? paddle.x + paddle.w + this.ball.r : paddle.x - this.ball.r;

                    this.shake(this.isFireMode ? 0.3 : 0.2, this.isFireMode ? 10 : 5);
                    this.spawnParticles(this.ball.x, this.ball.y, paddle.color, 15);
                    this.beep(400 + Math.abs(hitNormal) * 300, 0.1);
                }

                if (this.ball.x < 0 || this.ball.x > this.width) {
                    const playerScored = this.ball.x > this.width;
                    if (playerScored) {
                        this.p1.s++;
                    } else {
                        this.p2.s++;
                    }

                    this.updateScoreUI();
                    this.beep(playerScored ? 600 : 150, 0.3, 0.2);
                    this.shake(0.4, 15);

                    if (this.p1.s >= 10 || this.p2.s >= 10) {
                        return this.endGame(this.p1.s >= 10);
                    }

                    this.server = playerScored ? 2 : 1;
                    this.resetBall();
                }
            }

            updateScoreUI() {
                this.playerScoreEl.innerText = this.p1.s.toString().padStart(2, '0');
                this.computerScoreEl.innerText = this.p2.s.toString().padStart(2, '0');
            }

            draw() {
                this.ctx.drawImage(this.bgCanvas, 0, 0);

                this.particles.forEach(particle => {
                    this.ctx.globalAlpha = particle.life;
                    this.ctx.fillStyle = particle.color;
                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, particle.size * particle.life, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1;

                this.ball.trail.forEach((point, index) => {
                    const ratio = index / this.ball.trail.length;
                    this.ctx.fillStyle = point.fire
                        ? `rgba(255,100,0,${ratio})`
                        : `rgba(255,255,255,${ratio * 0.3})`;
                    this.ctx.beginPath();
                    this.ctx.arc(point.x, point.y, this.ball.r * (point.fire ? 1.5 : 1) * ratio, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                this.drawNeonRect(this.p1.x, this.p1.y, this.p1.w, this.p1.h, this.p1.color);
                this.drawNeonRect(this.p2.x, this.p2.y, this.p2.w, this.p2.h, this.p2.color);

                const ballColor = this.isFireMode ? '#ff6600' : '#fff';
                this.ctx.fillStyle = ballColor;
                this.ctx.shadowBlur = this.isFireMode ? 24 : 12;
                this.ctx.shadowColor = ballColor;
                this.ctx.beginPath();
                this.ctx.arc(this.ball.x, this.ball.y, this.ball.r * (this.isFireMode ? 1.2 : 1), 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.shadowBlur = 0;
            }

            drawNeonRect(x, y, width, height, color) {
                this.ctx.shadowBlur = 12;
                this.ctx.shadowColor = color;
                this.ctx.fillStyle = color;
                this.ctx.fillRect(x, y, width, height);
                this.ctx.shadowBlur = 0;
            }

            loop(timestamp) {
                if (!this.running) {
                    return;
                }

                const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
                this.lastTime = timestamp;
                this.update(dt);
                this.draw();
                requestAnimationFrame(nextFrame => this.loop(nextFrame));
            }

            start() {
                if (this.running) {
                    return;
                }

                if (this.p1.s >= 10 || this.p2.s >= 10) {
                    this.p1.s = 0;
                    this.p2.s = 0;
                    this.updateScoreUI();
                }

                this.specialCharges = 30;
                this.specialCountEl.innerText = '30';
                this.running = true;
                this.lastTime = performance.now();
                this.server = 2;
                this.resetBall();
                requestAnimationFrame(timestamp => this.loop(timestamp));
                this.startBtn.innerText = '比赛进行中';
                this.canvas.style.cursor = 'none';
            }

            resetMatch() {
                this.running = false;
                this.p1.s = 0;
                this.p2.s = 0;
                this.p1.y = 168;
                this.p2.y = 168;
                this.specialCharges = 30;
                this.server = 2;
                this.specialCountEl.innerText = '30';
                this.updateScoreUI();
                this.draw();
                this.startBtn.innerText = '开始比赛';
                this.canvas.style.cursor = 'default';
            }

            endGame(win) {
                this.running = false;
                this.canvas.style.cursor = 'default';
                this.playEndAnimation(win);
            }

            playEndAnimation(win) {
                const startTime = performance.now();
                const duration = 4000;
                const particles = [];
                const texts = [];

                const createParticles = () => {
                    const colors = win ? ['#0f8', '#4ff', '#0a0', '#8f0'] : ['#f66', '#f84', '#f40', '#f00'];
                    for (let i = 0; i < 150; i++) {
                        const angle = (Math.PI * 2 * i) / 150 + Math.random() * 0.5;
                        const speed = Math.random() * 300 + 100;
                        particles.push({
                            x: this.width / 2,
                            y: this.height / 2,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            life: 1,
                            size: Math.random() * 6 + 2,
                            color: colors[Math.floor(Math.random() * colors.length)],
                            delay: Math.random() * 500
                        });
                    }
                };

                const createTexts = () => {
                    const mainText = win ? '凯旋归来' : '再接再厉';
                    const subText = win ? '恭喜获胜' : '不要气馁';
                    const chars = mainText.split('');

                    chars.forEach((char, index) => {
                        texts.push({
                            char,
                            x: this.width / 2 + (index - chars.length / 2 + 0.5) * 55,
                            y: 150,
                            targetY: 200,
                            scale: 0,
                            targetScale: 1,
                            delay: index * 100 + 300,
                            alpha: 0
                        });
                    });

                    texts.push({
                        char: subText,
                        x: this.width / 2,
                        y: 300,
                        targetY: 280,
                        scale: 0.5,
                        targetScale: 1,
                        delay: 800,
                        alpha: 0,
                        isSub: true
                    });
                };

                createParticles();
                createTexts();

                const animate = time => {
                    const elapsed = time - startTime;
                    const progress = Math.min(elapsed / duration, 1);

                    this.ctx.fillStyle = `rgba(0, 0, 0, ${0.02 + progress * 0.08})`;
                    this.ctx.fillRect(0, 0, this.width, this.height);

                    const ringRadius = Math.min(progress * 500, 300);
                    const ringAlpha = progress < 0.3 ? progress * 3 : 1 - (progress - 0.3) * 0.4;
                    const ringColor = win ? `rgba(15, 255, 136, ${ringAlpha})` : `rgba(255, 102, 102, ${ringAlpha})`;

                    this.ctx.strokeStyle = ringColor;
                    this.ctx.lineWidth = 4;
                    this.ctx.shadowBlur = 30;
                    this.ctx.shadowColor = ringColor;
                    this.ctx.beginPath();
                    this.ctx.arc(
                        this.width / 2,
                        this.height / 2,
                        ringRadius * (0.8 + Math.sin(elapsed * 0.003) * 0.1),
                        0,
                        Math.PI * 2
                    );
                    this.ctx.stroke();

                    particles.forEach(particle => {
                        if (elapsed < particle.delay) {
                            return;
                        }

                        const particleProgress = (elapsed - particle.delay) / (duration - particle.delay);
                        if (particleProgress > 1) {
                            return;
                        }

                        const x = particle.x + particle.vx * particleProgress;
                        const y = particle.y + particle.vy * particleProgress + 100 * particleProgress * particleProgress;
                        const size = particle.size * (1 - particleProgress * 0.8);
                        const alpha = 1 - particleProgress;

                        this.ctx.fillStyle = particle.color;
                        this.ctx.globalAlpha = alpha;
                        this.ctx.shadowBlur = 10;
                        this.ctx.shadowColor = particle.color;
                        this.ctx.beginPath();
                        this.ctx.arc(x, y, size, 0, Math.PI * 2);
                        this.ctx.fill();
                    });

                    texts.forEach(text => {
                        if (elapsed < text.delay) {
                            return;
                        }

                        const textProgress = Math.min((elapsed - text.delay) / 600, 1);
                        const easeOut = 1 - Math.pow(1 - textProgress, 3);
                        const currentY = text.y + (text.targetY - text.y) * easeOut;
                        const currentScale = text.scale + (text.targetScale - text.scale) * easeOut;
                        const alpha = Math.sin(textProgress * Math.PI * 0.5);

                        this.ctx.save();
                        this.ctx.translate(text.x, currentY);
                        this.ctx.scale(currentScale, currentScale);
                        this.ctx.globalAlpha = alpha;
                        this.ctx.fillStyle = text.isSub ? '#aaa' : (win ? '#0f8' : '#f66');
                        this.ctx.font = text.isSub ? 'bold 28px PingFang SC' : 'bold 64px PingFang SC';
                        this.ctx.textAlign = 'center';
                        this.ctx.shadowBlur = text.isSub ? 10 : 25;
                        this.ctx.shadowColor = win ? '#0f8' : '#f66';
                        this.ctx.fillText(text.char, 0, 0);
                        this.ctx.restore();
                    });

                    if (progress > 0.6) {
                        const hintAlpha = (progress - 0.6) * 2.5;
                        this.ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(hintAlpha, 0.6)})`;
                        this.ctx.font = '16px PingFang SC';
                        this.ctx.textAlign = 'center';
                        this.ctx.shadowBlur = 0;
                        this.ctx.fillText('点击“再次挑战”开始', this.width / 2, 350);
                    }

                    this.ctx.globalAlpha = 1;
                    this.ctx.shadowBlur = 0;

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };

                requestAnimationFrame(animate);
                this.startBtn.innerText = '再次挑战';
                this.beep(win ? 880 : 220, 0.5, 0.3);
            }
        }

        const game = new PongGame();
    </script>
</body>
</html>
